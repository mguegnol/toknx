x-coordinator-env: &coordinator-env
  TOKNX_DATABASE_URL: ${TOKNX_DATABASE_URL}
  TOKNX_REDIS_URL: ${TOKNX_REDIS_URL}
  TOKNX_PUBLIC_BASE_URL: ${TOKNX_PUBLIC_BASE_URL}
  TOKNX_NODE_TUNNEL_PUBLIC_BASE_URL: ${TOKNX_NODE_TUNNEL_PUBLIC_BASE_URL}
  TOKNX_GITHUB_CLIENT_ID: ${TOKNX_GITHUB_CLIENT_ID}
  TOKNX_GITHUB_CLIENT_SECRET: ${TOKNX_GITHUB_CLIENT_SECRET}
  TOKNX_GITHUB_REDIRECT_URL: ${TOKNX_GITHUB_REDIRECT_URL}
  TOKNX_DASHBOARD_ORIGIN: ${TOKNX_DASHBOARD_ORIGIN}
  TOKNX_AUTH_DEV_BYPASS: ${TOKNX_AUTH_DEV_BYPASS}
  TOKNX_JWT_SECRET: ${TOKNX_JWT_SECRET}
  TOKNX_COORDINATOR_SIGNUP_BONUS: ${TOKNX_COORDINATOR_SIGNUP_BONUS}
  TOKNX_NODE_STAKE_CREDITS: ${TOKNX_NODE_STAKE_CREDITS}
  TOKNX_QUEUE_TIMEOUT_SECONDS: ${TOKNX_QUEUE_TIMEOUT_SECONDS}
  TOKNX_MODEL_QUEUE_CAP: ${TOKNX_MODEL_QUEUE_CAP}
  TOKNX_ACCOUNT_INFLIGHT_LIMIT: ${TOKNX_ACCOUNT_INFLIGHT_LIMIT}
  TOKNX_NODE_KEEPALIVE_SECONDS: ${TOKNX_NODE_KEEPALIVE_SECONDS}
  TOKNX_NODE_OFFLINE_AFTER_SECONDS: ${TOKNX_NODE_OFFLINE_AFTER_SECONDS}
  TOKNX_FEE_PERCENT: ${TOKNX_FEE_PERCENT}

x-dashboard-env: &dashboard-env
  TOKNX_PUBLIC_API_BASE: ${TOKNX_PUBLIC_API_BASE}
  VITE_TOKNX_API_BASE: ${VITE_TOKNX_API_BASE}

services:
  traefik:
    image: traefik:v3.3
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --api.dashboard=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  coordinator:
    build:
      context: ./apps/coordinator
    environment:
      <<: *coordinator-env
      TOKNX_AUTH_DEV_BYPASS: "true"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment: *dashboard-env
    depends_on:
      - coordinator

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: toknx
      POSTGRES_USER: toknx
      POSTGRES_PASSWORD: toknx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
