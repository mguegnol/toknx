services:
  coordinator:
    build:
      context: ./apps/coordinator
    restart: unless-stopped
    environment:
      TOKNX_DATABASE_URL: ${TOKNX_DATABASE_URL}
      TOKNX_REDIS_URL: ${TOKNX_REDIS_URL}
      TOKNX_PUBLIC_BASE_URL: ${TOKNX_PUBLIC_BASE_URL}
      TOKNX_NODE_TUNNEL_PUBLIC_BASE_URL: ${TOKNX_NODE_TUNNEL_PUBLIC_BASE_URL}
      TOKNX_GITHUB_CLIENT_ID: ${TOKNX_GITHUB_CLIENT_ID}
      TOKNX_GITHUB_CLIENT_SECRET: ${TOKNX_GITHUB_CLIENT_SECRET}
      TOKNX_GITHUB_REDIRECT_URL: ${TOKNX_GITHUB_REDIRECT_URL}
      TOKNX_DASHBOARD_ORIGIN: ${TOKNX_DASHBOARD_ORIGIN}
      TOKNX_AUTH_DEV_BYPASS: ${TOKNX_AUTH_DEV_BYPASS}
      TOKNX_JWT_SECRET: ${TOKNX_JWT_SECRET}
      TOKNX_COORDINATOR_SIGNUP_BONUS: ${TOKNX_COORDINATOR_SIGNUP_BONUS}
      TOKNX_NODE_STAKE_CREDITS: ${TOKNX_NODE_STAKE_CREDITS}
      TOKNX_QUEUE_TIMEOUT_SECONDS: ${TOKNX_QUEUE_TIMEOUT_SECONDS}
      TOKNX_MODEL_QUEUE_CAP: ${TOKNX_MODEL_QUEUE_CAP}
      TOKNX_ACCOUNT_INFLIGHT_LIMIT: ${TOKNX_ACCOUNT_INFLIGHT_LIMIT}
      TOKNX_NODE_KEEPALIVE_SECONDS: ${TOKNX_NODE_KEEPALIVE_SECONDS}
      TOKNX_NODE_OFFLINE_AFTER_SECONDS: ${TOKNX_NODE_OFFLINE_AFTER_SECONDS}
      TOKNX_FEE_PERCENT: ${TOKNX_FEE_PERCENT}
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TOKNX_TRAEFIK_NETWORK}
      - traefik.http.routers.toknx-api.rule=Host(`${TOKNX_API_DOMAIN}`)
      - traefik.http.routers.toknx-api.entrypoints=websecure
      - traefik.http.routers.toknx-api.tls=true
      - traefik.http.routers.toknx-api.tls.certresolver=letsencrypt
      - traefik.http.services.toknx-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: ./apps/dashboard
    restart: unless-stopped
    environment:
      TOKNX_PUBLIC_API_BASE: ${TOKNX_PUBLIC_API_BASE}
      VITE_TOKNX_API_BASE: ${VITE_TOKNX_API_BASE}
    depends_on:
      - coordinator
    networks:
      - default
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TOKNX_TRAEFIK_NETWORK}
      - traefik.http.routers.toknx-dashboard.rule=Host(`${TOKNX_DASHBOARD_DOMAIN}`)
      - traefik.http.routers.toknx-dashboard.entrypoints=websecure
      - traefik.http.routers.toknx-dashboard.tls=true
      - traefik.http.routers.toknx-dashboard.tls.certresolver=letsencrypt
      - traefik.http.services.toknx-dashboard.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TOKNX_POSTGRES_DB}
      POSTGRES_USER: ${TOKNX_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TOKNX_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

networks:
  edge:
    external: true
    name: ${TOKNX_TRAEFIK_NETWORK}

volumes:
  postgres-data:
